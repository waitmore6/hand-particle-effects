<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子手势交互系统 v4.0 - 炫彩流光定制版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #010103;
            font-family: system-ui, sans-serif;
        }
        #particleCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #webcam {
            position: absolute; top: 20px; right: 20px; width: 140px; height: 105px;
            border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2);
            transform: scaleX(-1); z-index: 10; background: #000;
        }
        #statusUI {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; color: rgba(255, 255, 255, 0.9); background: rgba(8, 8, 15, 0.9);
            padding: 12px 28px; border-radius: 60px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); font-size: 14px;
            text-align: center; min-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .mode-text { font-weight: bold; }
        .glowing-cyan { color: #00fff2; text-shadow: 0 0 8px rgba(0,255,242,0.6); }
        .glowing-blue { color: #0099ff; text-shadow: 0 0 8px rgba(0,153,255,0.7); }
        .glowing-orange { color: #ff6a00; text-shadow: 0 0 8px rgba(255,106,0,0.6); }
        .glowing-gold { color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.8); }
    </style>
    
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    <video id="webcam" autoplay playsinline></video>
    <div id="statusUI">正在加载 4.0 炫彩视觉模型...</div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const statusUI = document.getElementById('statusUI');

        // Web Audio 声音引擎
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playExplosionSound() {
            try {
                initAudio(); if (!audioCtx) return;
                const now = audioCtx.currentTime;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(45, now + 0.4);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
                
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.45);

                const metallicOsc = audioCtx.createOscillator();
                const metallicGain = audioCtx.createGain();
                metallicOsc.type = 'triangle';
                metallicOsc.frequency.setValueAtTime(700, now);
                metallicOsc.frequency.exponentialRampToValueAtTime(120, now + 0.25);
                metallicGain.gain.setValueAtTime(0.08, now);
                metallicGain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                
                metallicOsc.connect(metallicGain); metallicGain.connect(audioCtx.destination);
                metallicOsc.start(now); metallicOsc.stop(now + 0.25);
            } catch (e) { console.log(e); }
        }

        let interaction = {
            x: window.innerWidth / 2, y: window.innerHeight / 2,
            smoothX: window.innerWidth / 2, smoothY: window.innerHeight / 2,
            active: false, mode: 'idle' 
        };
        
        let lastMode = 'idle';

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const PARTICLE_COUNT = 1200; 
        const particles = [];
        
        // 🎨 新配色矩阵
        const themes = {
            one: ['rgba(0, 255, 242, ', 'rgba(0, 150, 255, '],       // 单指吸附：赛博青蓝
            vortex: ['rgba(0, 162, 255, ', 'rgba(0, 234, 255, '],   // V手势：纯净通透电光蓝（新）
            palm: ['rgba(255, 106, 0, ', 'rgba(255, 162, 0, '],     // 张开手：高亮脉冲荧光橙（新）
            fist: ['rgba(255, 215, 0, ', 'rgba(255, 170, 0, ']      // 握拳：重金属耀眼流金色（新）
        };

        class QuantumParticle {
            constructor() { this.init(true); }
            
            init(allRandom = false) {
                if (allRandom) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 5;
                    this.vy = (Math.random() - 0.5) * 5;
                } else if (interaction.mode === 'fist') {
                    this.x = interaction.smoothX;
                    this.y = interaction.smoothY;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 7 + 4; 
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 25;
                    this.x = interaction.smoothX + Math.cos(angle) * radius;
                    this.y = interaction.smoothY + Math.sin(angle) * radius;
                    this.vx = (Math.random() - 0.5) * 3;
                    this.vy = (Math.random() - 0.5) * 3;
                }
                
                this.size = Math.random() * 2.2 + 1.2;
                this.friction = (interaction.mode === 'fist') ? 0.95 : 0.92;
                this.colorType = Math.random() > 0.5 ? 0 : 1;
                this.alpha = Math.random() * 0.6 + 0.4;
            }

            update() {
                const dx = interaction.smoothX - this.x;
                const dy = interaction.smoothY - this.y;
                const distSq = dx * dx + dy * dy || 0.001;
                const dist = Math.sqrt(distSq);

                switch (interaction.mode) {
                    case 'fist':
                        const fx = this.x - interaction.smoothX;
                        const fy = this.y - interaction.smoothY;
                        this.alpha = Math.random() * 0.5 + 0.5; // 金色离子高频闪烁
                        this.vx += (fx / (dist || 1)) * 0.32;
                        this.vy += (fy / (dist || 1)) * 0.32;
                        break;
                    case 'one_finger':
                        const fOne = Math.min(7, 950 / dist); 
                        this.vx += (dx / dist) * fOne * 0.45; this.vy += (dy / dist) * fOne * 0.45;
                        break;
                    case 'vortex':
                        const angle = Math.atan2(dy, dx) + Math.PI / 2 + 0.18;
                        const fVortex = Math.min(9, dist * 0.06 + 3.5);
                        this.vx += (Math.cos(angle) * fVortex - this.vx) * 0.15;
                        this.vy += (Math.sin(angle) * fVortex - this.vy) * 0.15;
                        break;
                    case 'open_palm':
                        const fPalm = Math.min(2.5, 350 / dist);
                        this.vx += (dx / dist) * fPalm * 0.12;
                        this.vy += (dy / dist) * fPalm * 0.12;
                        break;
                    default:
                        const fIdleAngle = Math.atan2(dy, dx) + Math.PI / 2;
                        this.vx += Math.cos(fIdleAngle) * 0.1 + (dx / dist) * 0.02;
                        this.vy += Math.sin(fIdleAngle) * 0.1 + (dy / dist) * 0.02;
                }
                
                this.vx *= this.friction; this.vy *= this.friction;
                this.x += this.vx; this.y += this.vy;
                
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.init(false);
            }

            draw() {
                let palette = themes.one;
                if (interaction.mode === 'vortex') palette = themes.vortex;
                else if (interaction.mode === 'open_palm') palette = themes.palm;
                else if (interaction.mode === 'fist') palette = themes.fist;

                ctx.fillStyle = `${palette[this.colorType]}${this.alpha})`;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new QuantumParticle());

        function detectExactGesture(landmarks) {
            const indexUp = landmarks[8].y < landmarks[6].y;   
            const middleUp = landmarks[12].y < landmarks[10].y; 
            const ringUp = landmarks[16].y < landmarks[14].y; 
            const pinkyUp = landmarks[20].y < landmarks[18].y; 
            const mainFingersUp = [indexUp, middleUp, ringUp, pinkyUp].filter(v => v).length;

            if (mainFingersUp === 0) return 'FIST';
            if (mainFingersUp >= 3) return 'OPEN_PALM';
            if (indexUp && middleUp && !ringUp && !pinkyUp) return 'V_SIGN';
            if (indexUp && !middleUp && !ringUp && !pinkyUp) return 'ONE_FINGER';
            return 'GENERIC_TRACKING';
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const gesture = detectExactGesture(landmarks);
                
                interaction.x = (1 - landmarks[9].x) * canvas.width;
                interaction.y = landmarks[9].y * canvas.height;
                interaction.active = true;

                switch (gesture) {
                    case 'FIST':
                        interaction.mode = 'fist';
                        statusUI.innerHTML = `手势：✊ <span class="mode-text glowing-gold">重金属流金引爆 (冲击波)</span>`;
                        if (lastMode !== 'fist') {
                            particles.forEach(p => p.init(false));
                            playExplosionSound();
                        }
                        break;
                    case 'OPEN_PALM':
                        interaction.mode = 'open_palm';
                        statusUI.innerHTML = `手势：✋ <span class="mode-text glowing-orange">荧光橙色脉冲 (星云)</span>`;
                        break;
                    case 'V_SIGN':
                        interaction.mode = 'vortex';
                        statusUI.innerHTML = `手势：✌️ <span class="mode-text glowing-blue">未来通透电光蓝 (风暴)</span>`;
                        break;
                    case 'ONE_FINGER':
                        interaction.mode = 'one_finger';
                        statusUI.innerHTML = `手势：☝️ <span class="mode-text glowing-cyan">赛博吸附 (1s超长流光拖尾)</span>`;
                        break;
                    default:
                        interaction.mode = 'one_finger';
                        statusUI.innerHTML = `手部捕捉中...`;
                }
                lastMode = interaction.mode;
            } else {
                interaction.x = window.innerWidth / 2; interaction.y = window.innerHeight / 2;
                interaction.active = false; interaction.mode = 'idle'; lastMode = 'idle';
                statusUI.innerHTML = `请伸出手掌...`;
            }
        }

        window.addEventListener('click', () => { initAudio(); });

        const hands = new Hands({ locateFile: (file) => `https://unpkg.com/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onHandResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 320, height: 240
        });
        camera.start().then(() => { statusUI.innerText = "视觉渲染升级完毕！请在镜头前伸手"; });

        function animate() {
            ctx.globalCompositeOperation = 'source-over';
            
            // 💡 动态拖尾控制技术：当处于吸附或跟随状态时，通过超低清除率（0.055）维持约 1 秒的超长星空流光痕迹
            if (interaction.mode === 'one_finger' || interaction.mode === 'idle') {
                ctx.fillStyle = 'rgba(1, 1, 3, 0.055)'; 
            } else {
                // 张开手、V手势和爆炸时使用正常刷新率（0.22），防止画面变粘变糊
                ctx.fillStyle = 'rgba(1, 1, 3, 0.22)'; 
            }
            
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';

            const easing = interaction.active ? 0.45 : 0.08;
            interaction.smoothX += (interaction.x - interaction.smoothX) * easing;
            interaction.smoothY += (interaction.y - interaction.smoothY) * easing;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles[i].update(); particles[i].draw();
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
